<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLD 퀴즈 프로그램</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SQLD 자격증 퀴즈</h1>
            <div class="score-board">
                <span class="score">정답: <span id="correct-count">0</span></span>
                <span class="score">오답: <span id="wrong-count">0</span></span>
                <span class="score">진행률: <span id="progress">0/0</span></span>
            </div>
        </header>

        <main id="quiz-container">
            <div class="question-box">
                <div class="question-number">문제 <span id="question-number">1</span></div>
                <div class="question-text" id="question-text"></div>
            </div>

            <div class="options-container" id="options-container">
                <!-- 선택지들이 동적으로 추가됩니다 -->
            </div>

            <div class="result-box" id="result-box" style="display: none;">
                <div class="result-message" id="result-message"></div>
                <div class="correct-answer" id="correct-answer"></div>
                <div class="explanation" id="explanation"></div>
            </div>

            <div class="button-container">
                <button id="submit-btn" class="btn btn-primary">정답 확인</button>
                <button id="next-btn" class="btn btn-secondary" style="display: none;">다음 문제</button>
                <button id="restart-btn" class="btn btn-success" style="display: none;">다시 시작</button>
            </div>
        </main>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
